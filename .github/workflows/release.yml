name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build linux amd64 release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend dist
        working-directory: frontend
        run: npm run build-go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: backend-go/go.mod

      - name: Build Go binary
        working-directory: backend-go
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o file-editor-backend .

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          safe_tag_name="${tag_name//\//-}"
          archive_name="file-editor-${safe_tag_name}-linux-amd64.tar.gz"

          rm -rf release
          mkdir -p release
          cp backend-go/file-editor-backend release/
          cp -r backend-go/dist release/dist
          tar -C release -czf "${archive_name}" file-editor-backend dist

          echo "archive_name=${archive_name}" >> "${GITHUB_ENV}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive_name }}
          generate_release_notes: true
